services:
  db:
    image: postgis/postgis:16-3.4
    container_name: beyercrm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beyercrm
      POSTGRES_PASSWORD: beyercrm_dev_password
      POSTGRES_DB: beyercrm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beyercrm -d beyercrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:3-alpine
    container_name: beyercrm-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - db

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
