services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beyercrm-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://beyercrm:${POSTGRES_PASSWORD}@db:5432/beyercrm
      NEXTAUTH_URL: https://${CRM_DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - app_logs:/var/log/beyercrm
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    labels:
      - "com.beyercrm.service=app"

  db:
    image: postgis/postgis:16-3.4
    container_name: beyercrm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beyercrm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beyercrm_prod_password}
      POSTGRES_DB: beyercrm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_backups:/backups
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beyercrm -d beyercrm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
        compress: "true"
    labels:
      - "com.beyercrm.service=database"
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=4

  caddy:
    image: caddy:3-alpine
    container_name: beyercrm-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2019/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    labels:
      - "com.beyercrm.service=proxy"

volumes:
  postgres_data:
    driver: local
  db_backups:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  app_logs:
    driver: local
